###############################################################################
# autoandbid.com — nginx reverse proxy on ab-front1
#
# Cloudflare → :443 (Origin Cert)  →  this server
#                                    ├── /            → React build (SPA)
#                                    └── /api/*       → ab-back1:8001
#
# Install:
#   sudo cp autoandbid.conf /etc/nginx/sites-available/autoandbid
#   sudo ln -sf /etc/nginx/sites-available/autoandbid /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
###############################################################################

# Redirect bare HTTP → HTTPS (Cloudflare also enforces this, but we double up).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name autoandbid.com www.autoandbid.com;

    # ACME challenge passthrough (in case you ever need certbot directly).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Production HTTPS server. Origin Certificate is from Cloudflare → SSL/TLS →
# Origin Server. Cloudflare does the public-facing TLS; this is the inner leg.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name autoandbid.com www.autoandbid.com;

    ssl_certificate     /etc/ssl/autoandbid/cert.pem;
    ssl_certificate_key /etc/ssl/autoandbid/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Reasonable upload limit for car photos (frontend chunks larger uploads).
    client_max_body_size 25m;

    # Trust Cloudflare-set client IPs so rate limiters and audit logs see the
    # real visitor IP rather than the CF edge IP.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # Security headers (Cloudflare also sets some; we set them again to be
    # explicit). CSP is intentionally permissive for inline styles because
    # the CRA build emits some — tighten once the bundle is audited.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/autobids/build;
    index index.html;

    # ── Static SPA ──────────────────────────────────────────────────────────
    # Hashed assets (`/static/*`) are immutable — cache aggressively.
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker must NEVER be cached or it can pin a broken build forever.
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # SPA fallback for all client-side routes.
    location / {
        try_files $uri /index.html;
    }

    # ── API proxy → ab-back1:8001 ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://ab-back1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;

        # WebSockets for live bidding
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
    }

    # ── Stripe webhook ──────────────────────────────────────────────────────
    # Slightly looser timeout for retries; same target.
    location = /api/stripe/webhook {
        proxy_pass http://ab-back1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Block obvious garbage (PHP scanners, .env probing, etc.)
    location ~* \.(php|asp|aspx|env|git|sh|bak)$ {
        return 404;
    }

    # nginx own healthz (for uptime monitors that bypass Cloudflare).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
