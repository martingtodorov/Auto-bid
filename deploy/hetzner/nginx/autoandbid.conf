###############################################################################
# autoandbid — multi-domain nginx reverse proxy on ab-front1
#
# Three brand domains, served from the SAME React build. Frontend reads
# `window.location.hostname` and auto-applies the matching language:
#
#   autoandbid.com  →  English  (default for everyone outside BG/RO)
#   autoandbid.bg   →  Bulgarian
#   autoandbid.ro   →  Romanian
#
# Cloudflare → :443 (Origin Cert)  →  this server
#                                    ├── /            → React build (SPA)
#                                    └── /api/*       → ab-back1:8001
#
# Install:
#   sudo cp autoandbid.conf /etc/nginx/sites-available/autoandbid
#   sudo ln -sf /etc/nginx/sites-available/autoandbid /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
###############################################################################

# Social-bot detection map (must be at http context, NOT inside `server`).
# Used by the /auctions/{slug} location below to route crawlers to the
# SSR-rendered share endpoint while real users still hit the SPA.
map $http_user_agent $is_social_bot {
    default 0;
    "~*facebookexternalhit"  1;
    "~*facebot"              1;
    "~*twitterbot"           1;
    "~*slackbot"             1;
    "~*whatsapp"             1;
    "~*telegrambot"          1;
    "~*linkedinbot"          1;
    "~*discordbot"           1;
    "~*pinterestbot"         1;
    "~*skypeuripreview"      1;
    "~*redditbot"            1;
    "~*vkshare"              1;
    "~*applebot"             1;
    "~*googlebot-image"      1;
    "~*googlebot"            1;
    "~*bingbot"              1;
    "~*yandex"               1;
    "~*baiduspider"          1;
    "~*mastodon"             1;
    "~*iframely"             1;
    "~*embedly"              1;
    "~*linkpreview"          1;
    "~*metaspider"           1;
    "~*preview"              1;
    "~*unfurl"               1;
    "~*fetch"                1;
}

# Redirect bare HTTP → HTTPS on every domain (Cloudflare also enforces this).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name  autoandbid.com www.autoandbid.com
                 autoandbid.bg  www.autoandbid.bg
                 autoandbid.ro  www.autoandbid.ro
                 img.autoandbid.bg;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location /                            { return 301 https://$host$request_uri; }
}

# Canonicalise www.* → apex on every domain (one DNS record per TLD).
server {
    listen 443 ssl http2;
    server_name www.autoandbid.com;
    ssl_certificate     /etc/ssl/autoandbid/cert.pem;
    ssl_certificate_key /etc/ssl/autoandbid/key.pem;
    return 301 https://autoandbid.com$request_uri;
}
server {
    listen 443 ssl http2;
    server_name www.autoandbid.bg;
    ssl_certificate     /etc/ssl/autoandbid/cert.pem;
    ssl_certificate_key /etc/ssl/autoandbid/key.pem;
    return 301 https://autoandbid.bg$request_uri;
}
server {
    listen 443 ssl http2;
    server_name www.autoandbid.ro;
    ssl_certificate     /etc/ssl/autoandbid/cert.pem;
    ssl_certificate_key /etc/ssl/autoandbid/key.pem;
    return 301 https://autoandbid.ro$request_uri;
}

# Production HTTPS — single config serving all three brand domains.
# Origin Certificate from Cloudflare must include all three SANs:
#   autoandbid.com, *.autoandbid.com,
#   autoandbid.bg,  *.autoandbid.bg,
#   autoandbid.ro,  *.autoandbid.ro
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name autoandbid.com autoandbid.bg autoandbid.ro;

    ssl_certificate     /etc/ssl/autoandbid/cert.pem;
    ssl_certificate_key /etc/ssl/autoandbid/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Upload limit for car photos. A typical phone-camera shot is 4-6 MB
    # JPEG; an editorial submission with 25 categorised photos can reach
    # ~150 MB after base64 encoding + JSON framing. Keep this in sync with
    # the client-side cap in `SellPage.jsx` (currently 100 MB raw).
    client_max_body_size 200m;
    client_body_buffer_size 1m;
    client_body_timeout 120s;

    # Trust Cloudflare-set client IPs so rate limiters and audit logs see the
    # real visitor IP rather than the CF edge IP.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # Security headers (Cloudflare also sets some; we set them again to be
    # explicit). CSP is intentionally permissive for inline styles because
    # the CRA build emits some — tighten once the bundle is audited.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/autobids/build;
    index index.html;

    # ── Static SPA ──────────────────────────────────────────────────────────
    # Hashed assets (`/static/*`) are immutable — cache aggressively.
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker must NEVER be cached or it can pin a broken build forever.
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # ── Social-bot share rewrite for /auctions/{slug} ─────────────────────
    # When Facebook / Twitter / Slack / WhatsApp / LinkedIn / Telegram /
    # Discord crawl an auction URL, we route them to /api/share/auction/{id}
    # so they receive SSR-rendered Open Graph + JSON-LD meta. Real users
    # (any other UA) keep getting the React SPA via `try_files`.
    # `$is_social_bot` is defined via a `map` block at http context (top
    # of this file).
    location ~ ^/auctions/([^/]+)/?$ {
        if ($is_social_bot = 1) {
            rewrite ^/auctions/(.+)$ /api/share/auction/$1 last;
        }
        try_files $uri /index.html;
    }

    # ── Social-bot SSR rewrites for top-level listing pages ───────────────
    # /auctions (listing), /sales (sold archive), /leaderboard.
    # Same UA-gated rewrite — humans keep getting the SPA, bots see a
    # locale-aware meta snapshot that includes ItemList JSON-LD.
    location = / {
        if ($is_social_bot = 1) { rewrite ^ /api/share/home last; }
        try_files /index.html =404;
    }
    location = /auctions {
        if ($is_social_bot = 1) { rewrite ^ /api/share/auctions last; }
        try_files $uri /index.html;
    }
    location = /auctions/ {
        if ($is_social_bot = 1) { rewrite ^ /api/share/auctions last; }
        try_files $uri /index.html;
    }
    location = /sales {
        if ($is_social_bot = 1) { rewrite ^ /api/share/sales last; }
        try_files $uri /index.html;
    }
    location = /sales/ {
        if ($is_social_bot = 1) { rewrite ^ /api/share/sales last; }
        try_files $uri /index.html;
    }
    location = /leaderboard {
        if ($is_social_bot = 1) { rewrite ^ /api/share/leaderboard last; }
        try_files $uri /index.html;
    }
    location = /leaderboard/ {
        if ($is_social_bot = 1) { rewrite ^ /api/share/leaderboard last; }
        try_files $uri /index.html;
    }

    # SPA fallback for all client-side routes.
    location / {
        try_files $uri /index.html;
    }

    # ── /.well-known/webauthn — RP-related origin manifest ──────────────────
    # Required for passkey cross-domain support (Chromium 128+, Safari 18+).
    # RP ID is `autoandbid.bg`; the manifest lists .com and .ro as
    # related origins so a single passkey works on all three TLDs.
    location = /.well-known/webauthn {
        proxy_pass http://ab-back1:8001;
        proxy_set_header Host autoandbid.bg;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── API proxy → ab-back1:8001 ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://ab-back1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;

        # WebSockets for live bidding
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Large image-laden Sell submissions can take 30-60s to upload on
        # 4G mobile. Match nginx timeouts to the FastAPI body parse window.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering    off;
    }

    # ── Per-endpoint upload caps ────────────────────────────────────────────
    # Hard-cap video upload at 100 MB (matches backend validation). Same
    # proxy settings as /api/ — just a smaller body limit so a malicious
    # client cannot fill our disk via the 200 MB main-vhost ceiling.
    location = /api/sell/video-upload {
        client_max_body_size 100m;
        proxy_pass http://ab-back1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering    off;
    }

    # ── Static uploads served directly by nginx ────────────────────────────
    # Auction images are content-addressed under /opt/autobids/uploads.
    # Letting nginx serve them with `alias` skips uvicorn entirely (lower
    # CPU, better cache headers) and keeps URLs stable across deploys.
    # Must match `upload_dir` in ansible/group_vars/all.yml and the
    # `UPLOAD_DIR` env var for the backend service.
    location /api/uploads/ {
        alias /opt/autobids/uploads/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Dynamic robots.txt + sitemap → backend ─────────────────────────────
    # The admin-toggled "Deindex mode" setting flips robots.txt content and
    # makes the sitemap return 404. We proxy these three root-level URLs to
    # the FastAPI SEO router so crawlers always see the live state.
    location = /robots.txt {
        proxy_pass http://ab-back1:8001/api/robots.txt;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location = /sitemap.xml {
        proxy_pass http://ab-back1:8001/api/sitemap.xml;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location = /sitemap-images.xml {
        proxy_pass http://ab-back1:8001/api/sitemap-images.xml;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Stripe webhook ──────────────────────────────────────────────────────
    location = /api/stripe/webhook {
        proxy_pass http://ab-back1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Block obvious garbage (PHP scanners, .env probing, etc.)
    location ~* \.(php|asp|aspx|env|git|sh|bak)$ {
        return 404;
    }

    # nginx own healthz (for uptime monitors that bypass Cloudflare).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}


###############################################################################
# img.autoandbid.bg — DEDICATED media / CDN vhost
#
# This subdomain MUST NOT serve the React frontend. It exists purely to
# expose immutable image assets to browsers (and downstream CDNs like
# Cloudflare / BunnyCDN / Fastly when we graduate). Anything other than
# the whitelisted media paths returns 404.
#
# Backend resolves URLs through `IMAGE_BASE_URL=https://img.autoandbid.bg`
# (see `backend/services/image_variants.py::public_variant_url`).
#
# Whitelisted paths:
#   /uploads/         → /opt/autobids/uploads/         (original images)
#   /variants/        → /opt/autobids/uploads/variants (AVIF/WebP/JPG)
#   /social-images/   → /opt/autobids/social-images/   (OG snapshots)
#
# Everything else: hard 404. Visiting https://img.autoandbid.bg/ in a
# browser must NOT return the homepage.
###############################################################################
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name img.autoandbid.bg;

    ssl_certificate     /etc/ssl/autoandbid/cert.pem;
    ssl_certificate_key /etc/ssl/autoandbid/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Trust Cloudflare client IPs (same list as the main vhost) so any
    # rate-limit / abuse module on this domain sees the real visitor IP.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # CORS — allow the three brand domains to embed these assets via
    # `<img>` / `<picture>` / canvas. Wildcard is intentionally avoided
    # (some browsers refuse credentialed CORS with `*`).
    set $cors_origin "";
    if ($http_origin ~* ^https://(www\.)?(autoandbid\.(com|bg|ro))$) {
        set $cors_origin $http_origin;
    }

    # Per-extension Content-Type table (used by all static locations).
    # We override upstream guesses to keep Chrome's ORB happy when bytes
    # are minted via the @generate fallback (FastAPI sets Content-Type
    # already, but local override here protects against future drift).
    types {
        image/jpeg    jpg jpeg;
        image/png     png;
        image/webp    webp;
        image/avif    avif;
        image/gif     gif;
        image/svg+xml svg;
    }
    default_type application/octet-stream;

    # No frontend on this host.
    location = / {
        return 404;
    }

    # ── /uploads/ — STATIC serve directly from disk ────────────────────────
    # Files live on the same VPS as the backend (Phase 1 of the CDN
    # rollout, 2026-05-17). When ab-cdn1 is split out to its own node,
    # this alias is the only line that changes (NFS mount / rsync path).
    #
    # On a cold miss we fall through to `@generate`, which proxies to
    # FastAPI to mint the missing variant, persist it, and return bytes.
    # Subsequent requests hit `alias` directly — zero backend involvement.
    location /uploads/ {
        alias /opt/autobids/uploads/;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri @generate;
    }

    # ── /variants/ — STATIC serve from variant tree ────────────────────────
    # Backend emits URLs like
    #   https://img.autoandbid.bg/variants/aa/bb/<sha>/md.avif
    # We alias the same root, just one directory deeper, so the URL stays
    # clean. Cold miss → @generate.
    location /variants/ {
        alias /opt/autobids/uploads/variants/;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri @generate;
    }

    # ── /social-images/ — static OG snapshots (separate generator) ─────────
    # No on-demand fallback here; these are produced by a different
    # pipeline (services.og_image) that always pre-renders on auction
    # publish. A 404 is the correct response if the file is missing.
    location /social-images/ {
        alias /opt/autobids/social-images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # ── @generate — lazy variant materialiser ──────────────────────────────
    # Only invoked on cold miss for /uploads/ and /variants/. FastAPI's
    # `/uploads/variants/<aa>/<bb>/<sha>/<size>.<ext>` route generates
    # the requested variant, writes it to disk, and returns bytes. The
    # next request for the same URL is served straight from `alias` —
    # nginx never re-asks the backend.
    location @generate {
        internal;
        proxy_pass http://ab-back1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        proxy_read_timeout 30s;
    }

    # Everything else (including /, /index.html, /api/*, etc.) is denied.
    location / {
        return 404;
    }
}
