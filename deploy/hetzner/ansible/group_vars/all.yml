---
# ─── Repo & paths ────────────────────────────────────────────────────────────
repo_url:           "git@github.com:YOUR_ORG/autobids.git"   # CHANGE_ME
repo_branch:        "main"
app_dir:            "/opt/autobids"
backend_dir:        "{{ app_dir }}/backend"
frontend_build_dir: "{{ app_dir }}/frontend/build"
web_root:           "/var/www/autobids/build"
venv_dir:           "{{ app_dir }}/venv"
secrets_dir:        "/etc/autobids"
log_dir:            "/var/log/autobids"
backup_dir:         "/var/backups/autobids"
# Persistent disk storage for user-uploaded images (auctions, avatars).
# Served by nginx via `alias` at `/api/uploads/` and by the backend's
# `DiskStorage` via `UPLOAD_DIR`. Must match on both sides.
upload_dir:         "/opt/autobids/uploads"
# Public CDN base for uploaded media. nginx on this subdomain serves the
# same content-addressed files via `alias /opt/autobids/uploads/`.
# Auction photo URLs become `<cdn_base_url>/uploads/auctions/<sha>.<ext>`.
cdn_base_url:       "https://img.autoandbid.bg"

# ─── Versions ────────────────────────────────────────────────────────────────
# We intentionally use the OS default Python now (`python3`) rather than
# pinning a specific minor. Ubuntu 24.04 Noble ships Python 3.12 which is
# fully compatible with our requirements. `python_version` is kept around
# only for informational messages — the venv is created with `python3`.
python_version:   "3.12"
node_major:       "20"
mongo_major:      "7.0"
postgres_major:   "16"

# ─── Services ────────────────────────────────────────────────────────────────
service_user:     "www-data"
service_group:    "www-data"
backend_port:     8001

# ─── Network — used in /etc/hosts and ufw rules ──────────────────────────────
hosts_entries:
  - { name: "ab-front1", ip: "10.0.0.2" }
  - { name: "ab-back1",  ip: "10.0.0.3" }
  - { name: "ab-db1",    ip: "10.0.0.3" }
  - { name: "ab-deploy", ip: "10.0.0.2" }

private_network_cidr: "10.0.0.0/16"

# ─── Domains ─────────────────────────────────────────────────────────────────
# Three brand domains, single React build, language auto-detected by hostname.
primary_domain:   "autoandbid.com"   # international / English
domains:
  - "autoandbid.com"
  - "www.autoandbid.com"
  - "autoandbid.bg"
  - "www.autoandbid.bg"
  - "autoandbid.ro"
  - "www.autoandbid.ro"
