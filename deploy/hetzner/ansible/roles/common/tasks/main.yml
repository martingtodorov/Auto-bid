---
# Common base — applied to every host.
# Idempotent. Re-runs are safe.
#
# IMPORTANT (SSH safety): the deploy user's public key is installed
# BEFORE we touch sshd_config. Otherwise a failed key push would lock us
# out of the box and force a trip to the Hetzner KVM console.
#
# SSH POLICY (2026-05-16 update):
#   PermitRootLogin       prohibit-password   ← key-only root SSH, NO password
#   PubkeyAuthentication  yes                 ← always on, explicit
#   PasswordAuthentication no                 ← passwords disabled for every user
#
# Previous policy was `PermitRootLogin no` which broke operator jump
# access. The new policy keeps password login off (which was the actual
# security win) while letting root in via key — the equivalent of how
# Hetzner's official cloud-init image ships out of the box.
#
# Anti-regression: we also rewrite any /etc/ssh/sshd_config.d/*.conf
# snippets that contradict the above (Ubuntu 24.04 cloud-init's
# `50-cloud-init.conf` is the usual culprit — it sets
# `PasswordAuthentication yes` and overrides our main edit).

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install baseline system packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - htop
      - ufw
      - fail2ban
      - unattended-upgrades
      - logrotate
      - rsync
      - openssl
    state: present
  become: yes

- name: Ensure deploy user exists
  ansible.builtin.user:
    name: deploy
    shell: /bin/bash
    groups: sudo
    append: yes
    create_home: yes
  become: yes

- name: Allow deploy user passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/90-deploy
    content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"
  become: yes

# ── Provision deploy SSH key BEFORE we touch sshd_config ────────────────────
# Even with the relaxed policy (root key-only allowed), turning off
# password auth without a working key in place would lock us out. The
# assertion below makes that explicit — the play HALTS if no key is
# configured anywhere.
- name: Check for bundled deploy authorized_keys file
  ansible.builtin.stat:
    path: "{{ role_path }}/files/deploy_authorized_keys"
  register: _deploy_keys_file

- name: Load bundled deploy keys (if the file is present)
  ansible.builtin.set_fact:
    _deploy_key_lines: "{{ lookup('ansible.builtin.file', role_path ~ '/files/deploy_authorized_keys').splitlines() }}"
  when: _deploy_keys_file.stat.exists

- name: Install deploy user authorized_keys (from group_vars override or bundled file)
  ansible.posix.authorized_key:
    user: deploy
    state: present
    key: "{{ item }}"
  loop: "{{ deploy_ssh_public_keys | default(_deploy_key_lines | default([])) }}"
  when: (deploy_ssh_public_keys | default(_deploy_key_lines | default([]))) | length > 0
  become: yes

- name: Abort if no SSH key is configured for deploy user (lockout protection)
  ansible.builtin.assert:
    that:
      - (deploy_ssh_public_keys | default(_deploy_key_lines | default([]))) | length > 0
    fail_msg: >-
      Refusing to touch sshd — no public key is configured for the `deploy`
      user. Set `deploy_ssh_public_keys` in group_vars/host_vars OR drop one
      or more keys into `roles/common/files/deploy_authorized_keys`. Without
      a working key, turning password auth off would lock us out entirely.

# ── sshd hardening — KEY-ONLY for both root and deploy ──────────────────────
# Policy (intentionally NOT disabling root):
#   PermitRootLogin       prohibit-password   # root SSH allowed via key only
#   PubkeyAuthentication  yes                 # explicit — never leave to default
#   PasswordAuthentication no                 # no password login on any user
#
# We use `prohibit-password` rather than `yes` because:
#   * It still allows `ssh root@host` with the operator's key (which is what
#     we need for jump access / Hetzner ops);
#   * It explicitly forbids password fallback for root, which `yes` alone
#     does NOT do — `PermitRootLogin yes` + a sshd ignoring our explicit
#     `PasswordAuthentication no` (e.g. via /etc/ssh/sshd_config.d/*.conf
#     override) would silently re-enable root password login.
#
# `validate: sshd -t -f %s` runs sshd's own config syntax checker against
# the proposed file before lineinfile commits — invalid edits are rolled
# back automatically instead of breaking the running daemon on reload.
- name: Allow root SSH (key-only — never password)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^[#\s]*PermitRootLogin\b'
    line: 'PermitRootLogin prohibit-password'
    validate: 'sshd -t -f %s'
  become: yes
  notify: restart sshd

- name: Force public-key authentication on (explicit, never leave to default)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^[#\s]*PubkeyAuthentication\b'
    line: 'PubkeyAuthentication yes'
    validate: 'sshd -t -f %s'
  become: yes
  notify: restart sshd

- name: Disable password SSH auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^[#\s]*PasswordAuthentication\b'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f %s'
  become: yes
  notify: restart sshd

# Neutralise any /etc/ssh/sshd_config.d/*.conf snippets that flip
# PermitRootLogin / PasswordAuthentication back to "no" / "yes" — Ubuntu
# 24.04's cloud-init occasionally drops `50-cloud-init.conf` with
# `PasswordAuthentication yes`, which would silently override our edits
# above because the *.d snippets are loaded AFTER the main file. We grep
# for any conflicting directive and rewrite it.
- name: Find sshd_config.d snippets that override SSH policy
  ansible.builtin.shell: |
    set -eo pipefail
    if [ ! -d /etc/ssh/sshd_config.d ]; then exit 0; fi
    grep -lE '^[[:space:]]*(PermitRootLogin|PasswordAuthentication|PubkeyAuthentication)\b' \
      /etc/ssh/sshd_config.d/*.conf 2>/dev/null || true
  args:
    executable: /bin/bash
  register: _sshd_overrides
  changed_when: false

- name: Override PermitRootLogin in conflicting sshd_config.d snippets
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^[#\s]*PermitRootLogin\b'
    line: 'PermitRootLogin prohibit-password'
    validate: 'sshd -t -f /etc/ssh/sshd_config'
  loop: "{{ _sshd_overrides.stdout_lines | default([]) }}"
  when: _sshd_overrides.stdout_lines | default([]) | length > 0
  become: yes
  notify: restart sshd

- name: Override PasswordAuthentication in conflicting sshd_config.d snippets
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^[#\s]*PasswordAuthentication\b'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f /etc/ssh/sshd_config'
  loop: "{{ _sshd_overrides.stdout_lines | default([]) }}"
  when: _sshd_overrides.stdout_lines | default([]) | length > 0
  become: yes
  notify: restart sshd

- name: Populate /etc/hosts with private-network names
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED — autobids private network"
    block: |
      {% for h in hosts_entries %}
      {{ h.ip }}  {{ h.name }}
      {% endfor %}
  become: yes

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"
  become: yes

- name: Configure UFW default policies
  community.general.ufw:
    direction: "{{ item.dir }}"
    policy: "{{ item.policy }}"
  loop:
    - { dir: incoming, policy: deny }
    - { dir: outgoing, policy: allow }
  become: yes

- name: UFW — allow SSH (optionally restricted to operator_ssh_sources)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
    src: "{{ item }}"
  loop: "{{ operator_ssh_sources | default(['any']) }}"
  become: yes

- name: UFW — allow all traffic from the private LAN
  community.general.ufw:
    rule: allow
    src: "{{ private_network_cidr }}"
  become: yes

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: yes

- name: Ensure fail2ban running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: yes
  become: yes
