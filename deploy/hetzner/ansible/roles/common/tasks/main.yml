---
# Common base — applied to every host.
# Idempotent. Re-runs are safe.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install baseline system packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - htop
      - ufw
      - fail2ban
      - unattended-upgrades
      - logrotate
      - rsync
      - openssl
    state: present
  become: yes

- name: Ensure deploy user exists
  ansible.builtin.user:
    name: deploy
    shell: /bin/bash
    groups: sudo
    append: yes
    create_home: yes
  become: yes

- name: Allow deploy user passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/90-deploy
    content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"
  become: yes

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    validate: 'sshd -t -f %s'
  become: yes
  notify: restart sshd

- name: Disable password SSH auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f %s'
  become: yes
  notify: restart sshd

- name: Populate /etc/hosts with private-network names
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED — autobids private network"
    block: |
      {% for h in hosts_entries %}
      {{ h.ip }}  {{ h.name }}
      {% endfor %}
  become: yes

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"
  become: yes

- name: Configure UFW default policies
  community.general.ufw:
    direction: "{{ item.dir }}"
    policy: "{{ item.policy }}"
  loop:
    - { dir: incoming, policy: deny }
    - { dir: outgoing, policy: allow }
  become: yes

- name: UFW — allow SSH from anywhere
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  become: yes

- name: UFW — allow all traffic from the private LAN
  community.general.ufw:
    rule: allow
    src: "{{ private_network_cidr }}"
  become: yes

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: yes

- name: Ensure fail2ban running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: yes
  become: yes
