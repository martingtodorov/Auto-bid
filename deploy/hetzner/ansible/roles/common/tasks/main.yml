---
# Common base — applied to every host.
# Idempotent. Re-runs are safe.
#
# IMPORTANT (SSH safety): the deploy user's public key is installed
# BEFORE we disable root SSH. Otherwise a failed key push would lock us
# out of the box and force a trip to the Hetzner KVM console.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install baseline system packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - htop
      - ufw
      - fail2ban
      - unattended-upgrades
      - logrotate
      - rsync
      - openssl
    state: present
  become: yes

- name: Ensure deploy user exists
  ansible.builtin.user:
    name: deploy
    shell: /bin/bash
    groups: sudo
    append: yes
    create_home: yes
  become: yes

- name: Allow deploy user passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/90-deploy
    content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"
  become: yes

# ── Provision deploy SSH key BEFORE disabling root login ─────────────────────
# `deploy_ssh_public_keys` can be overridden in group_vars/host_vars.
# Default: drop whichever public keys live next to the role in
# `files/deploy_authorized_keys` (one per line).
- name: Check for bundled deploy authorized_keys file
  ansible.builtin.stat:
    path: "{{ role_path }}/files/deploy_authorized_keys"
  register: _deploy_keys_file

- name: Load bundled deploy keys (if the file is present)
  ansible.builtin.set_fact:
    _deploy_key_lines: "{{ lookup('ansible.builtin.file', role_path ~ '/files/deploy_authorized_keys').splitlines() }}"
  when: _deploy_keys_file.stat.exists

- name: Install deploy user authorized_keys (from group_vars override or bundled file)
  ansible.posix.authorized_key:
    user: deploy
    state: present
    key: "{{ item }}"
  loop: "{{ deploy_ssh_public_keys | default(_deploy_key_lines | default([])) }}"
  when: (deploy_ssh_public_keys | default(_deploy_key_lines | default([]))) | length > 0
  become: yes

- name: Abort if no SSH key is configured for deploy user (lockout protection)
  ansible.builtin.assert:
    that:
      - (deploy_ssh_public_keys | default(_deploy_key_lines | default([]))) | length > 0
    fail_msg: >-
      Refusing to harden SSH — no public key is configured for the `deploy`
      user. Set `deploy_ssh_public_keys` in group_vars/host_vars OR drop one
      or more keys into `roles/common/files/deploy_authorized_keys`. Disabling
      root SSH without a working deploy key would lock us out.

# Only NOW is it safe to harden sshd.
- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    validate: 'sshd -t -f %s'
  become: yes
  notify: restart sshd

- name: Disable password SSH auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f %s'
  become: yes
  notify: restart sshd

- name: Populate /etc/hosts with private-network names
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED — autobids private network"
    block: |
      {% for h in hosts_entries %}
      {{ h.ip }}  {{ h.name }}
      {% endfor %}
  become: yes

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"
  become: yes

- name: Configure UFW default policies
  community.general.ufw:
    direction: "{{ item.dir }}"
    policy: "{{ item.policy }}"
  loop:
    - { dir: incoming, policy: deny }
    - { dir: outgoing, policy: allow }
  become: yes

- name: UFW — allow SSH (optionally restricted to operator_ssh_sources)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
    src: "{{ item }}"
  loop: "{{ operator_ssh_sources | default(['any']) }}"
  become: yes

- name: UFW — allow all traffic from the private LAN
  community.general.ufw:
    rule: allow
    src: "{{ private_network_cidr }}"
  become: yes

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: yes

- name: Ensure fail2ban running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: yes
  become: yes
