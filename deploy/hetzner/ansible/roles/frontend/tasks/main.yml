---
# Frontend role — runs on ab-front1.
# Builds React via Node 20, deploys static bundle to /var/www, configures nginx.
#
# Production notes (permanent fixes from first deploy):
#   • `yarn build` runs with CI=false — CRA treats ESLint warnings as fatal
#     under CI=true, which breaks prod builds over cosmetic lint issues.
#   • `.env.production` and the nginx Cloudflare Origin cert files are
#     provisioned with `force: no` so reruns never clobber prod secrets /
#     already-installed TLS material.

- name: Open HTTP/HTTPS publicly
  # Hetzner firewall should further lock :80 / :443 down to Cloudflare IP ranges
  # — see nginx conf / INITIAL_DEPLOY.md "Phase 9: Lock-down" section.
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ['80', '443']
  become: yes

# ─── Node 20 ──────────────────────────────────────────────────────────────────
- name: Install NodeSource keyring
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://deb.nodesource.com/setup_{{ node_major }}.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
  become: yes

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: yes
  become: yes

- name: Install yarn globally (matches dev workflow)
  ansible.builtin.npm:
    name: yarn
    global: yes
    state: present
  become: yes

# ─── Code ─────────────────────────────────────────────────────────────────────
- name: Ensure app dir exists
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: deploy
    group: deploy
    mode: "0755"
  become: yes

- name: Clone or update repo
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}/repo"
    version: "{{ repo_branch }}"
    force: yes
    update: yes
  become_user: deploy
  become: yes

- name: Sync frontend/ into runtime location
  ansible.posix.synchronize:
    src: "{{ app_dir }}/repo/frontend/"
    dest: "{{ app_dir }}/frontend/"
    delete: yes
    rsync_opts: ["--exclude=node_modules", "--exclude=build"]
  delegate_to: "{{ inventory_hostname }}"

- name: Check whether .env.production already exists
  ansible.builtin.stat:
    path: "{{ app_dir }}/frontend/.env.production"
  register: _frontend_env_stat
  become: yes

- name: Drop production env (ONLY on first install — prod is never clobbered)
  ansible.builtin.copy:
    src: frontend.env.production
    dest: "{{ app_dir }}/frontend/.env.production"
    owner: deploy
    group: deploy
    mode: "0640"
    force: no
  become: yes
  when: not _frontend_env_stat.stat.exists

- name: yarn install
  ansible.builtin.command: yarn install --frozen-lockfile
  args:
    chdir: "{{ app_dir }}/frontend"
  become_user: deploy
  become: yes
  changed_when: true

- name: yarn build (production — CI=false so lint warnings are non-fatal)
  ansible.builtin.command: yarn build
  args:
    chdir: "{{ app_dir }}/frontend"
  environment:
    NODE_ENV: production
    CI: "false"
    GENERATE_SOURCEMAP: "false"
  become_user: deploy
  become: yes
  changed_when: true

- name: Ensure web root exists
  ansible.builtin.file:
    path: "{{ web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  become: yes

- name: Atomically swap build into web root
  ansible.posix.synchronize:
    src: "{{ app_dir }}/frontend/build/"
    dest: "{{ web_root }}/"
    delete: yes
    owner: no
    group: no
  delegate_to: "{{ inventory_hostname }}"

- name: Fix ownership on web root
  ansible.builtin.file:
    path: "{{ web_root }}"
    owner: www-data
    group: www-data
    recurse: yes
  become: yes

# ─── nginx ────────────────────────────────────────────────────────────────────
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
  become: yes

- name: Ensure SSL cert directory exists (Cloudflare Origin certs live here)
  ansible.builtin.file:
    path: /etc/ssl/autoandbid
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: yes

- name: Deploy site config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../nginx/autoandbid.conf"
    dest: /etc/nginx/sites-available/autoandbid
    owner: root
    group: root
    mode: "0644"
  become: yes
  notify: reload nginx

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/autoandbid
    dest: /etc/nginx/sites-enabled/autoandbid
    state: link
  become: yes
  notify: reload nginx

- name: Disable default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: yes
  notify: reload nginx

- name: Validate nginx config
  # Fails the play immediately if `nginx -t` errors — cert files must be in
  # place before this task runs. See INITIAL_DEPLOY.md "TLS material" step.
  ansible.builtin.command: nginx -t
  changed_when: false
  become: yes

# Force-flush deferred handlers RIGHT NOW (don't wait for end of play). The
# default Ansible behaviour is "run handlers at the end of the role" which
# means if a later task fails, nginx never reloads even though the config
# already changed on disk. Flushing here makes the rest of the play see a
# reloaded nginx + we can sanity-check the new config below.
- name: Flush handlers (reload nginx now if changed)
  ansible.builtin.meta: flush_handlers

- name: Ensure nginx running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes
  become: yes

# ─── Post-deploy CDN smoke test ─────────────────────────────────────────────
# Catches the "nginx didn't actually reload / wrong vhost still active"
# class of bugs that have bitten us repeatedly. We hit the local nginx
# directly (bypass Cloudflare) with the img subdomain Host header.
# Expected: HTTP 4xx (404 from the dedicated img vhost when the file
# doesn't exist) or 200 (when the file exists). What's NOT acceptable
# is a 301 redirect to autoandbid.com — that's the symptom of the bug.
- name: Smoke test img.autoandbid.bg vhost (origin, bypassing Cloudflare)
  ansible.builtin.shell: |
    set -eo pipefail
    code=$(curl -sk -o /dev/null -w '%{http_code}' \
      -H 'Host: img.autoandbid.bg' \
      'https://127.0.0.1/uploads/__nonexistent_probe__.jpg')
    loc=$(curl -sk -I -H 'Host: img.autoandbid.bg' \
      'https://127.0.0.1/uploads/__nonexistent_probe__.jpg' \
      | grep -i '^location:' | tr -d '\r' || true)
    echo "code=$code location=$loc"
    # The dedicated img vhost should answer 404 (file missing) or 502
    # (backend transient). It must NOT 301 to autoandbid.com.
    case "$code" in
      404|502|400) exit 0 ;;
      301|302) echo "FAIL: img.autoandbid.bg is redirecting (deployed config still wrong)"; exit 1 ;;
      *) echo "WARN: unexpected status $code"; exit 0 ;;
    esac
  args:
    executable: /bin/bash
  changed_when: false
  become: yes
  register: cdn_smoke

- name: Display CDN smoke result
  ansible.builtin.debug:
    var: cdn_smoke.stdout_lines
