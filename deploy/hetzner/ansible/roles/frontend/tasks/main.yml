---
# Frontend role — runs on ab-front1.
# Builds React via Node 20, deploys static bundle to /var/www, configures nginx.
#
# Production notes (permanent fixes from first deploy):
#   • `yarn build` runs with CI=false — CRA treats ESLint warnings as fatal
#     under CI=true, which breaks prod builds over cosmetic lint issues.
#   • `.env.production` and the nginx Cloudflare Origin cert files are
#     provisioned with `force: no` so reruns never clobber prod secrets /
#     already-installed TLS material.

- name: Open HTTP/HTTPS publicly
  # Hetzner firewall should further lock :80 / :443 down to Cloudflare IP ranges
  # — see nginx conf / INITIAL_DEPLOY.md "Phase 9: Lock-down" section.
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ['80', '443']
  become: yes

# ─── Node 20 ──────────────────────────────────────────────────────────────────
- name: Install NodeSource keyring
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://deb.nodesource.com/setup_{{ node_major }}.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
  become: yes

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: yes
  become: yes

- name: Install yarn globally (matches dev workflow)
  ansible.builtin.npm:
    name: yarn
    global: yes
    state: present
  become: yes

# ─── Code ─────────────────────────────────────────────────────────────────────
- name: Ensure app dir exists
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: deploy
    group: deploy
    mode: "0755"
  become: yes

- name: Clone or update repo
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}/repo"
    version: "{{ repo_branch }}"
    force: yes
    update: yes
  become_user: deploy
  become: yes

- name: Sync frontend/ into runtime location
  ansible.posix.synchronize:
    src: "{{ app_dir }}/repo/frontend/"
    dest: "{{ app_dir }}/frontend/"
    delete: yes
    rsync_opts: ["--exclude=node_modules", "--exclude=build"]
  delegate_to: "{{ inventory_hostname }}"

- name: Check whether .env.production already exists
  ansible.builtin.stat:
    path: "{{ app_dir }}/frontend/.env.production"
  register: _frontend_env_stat
  become: yes

- name: Drop production env (ONLY on first install — prod is never clobbered)
  ansible.builtin.copy:
    src: frontend.env.production
    dest: "{{ app_dir }}/frontend/.env.production"
    owner: deploy
    group: deploy
    mode: "0640"
    force: no
  become: yes
  when: not _frontend_env_stat.stat.exists

- name: yarn install
  ansible.builtin.command: yarn install --frozen-lockfile
  args:
    chdir: "{{ app_dir }}/frontend"
  become_user: deploy
  become: yes
  changed_when: true

- name: yarn build (production — CI=false so lint warnings are non-fatal)
  ansible.builtin.command: yarn build
  args:
    chdir: "{{ app_dir }}/frontend"
  environment:
    NODE_ENV: production
    CI: "false"
    GENERATE_SOURCEMAP: "false"
  become_user: deploy
  become: yes
  changed_when: true

- name: Ensure web root exists
  ansible.builtin.file:
    path: "{{ web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  become: yes

- name: Atomically swap build into web root
  ansible.posix.synchronize:
    src: "{{ app_dir }}/frontend/build/"
    dest: "{{ web_root }}/"
    delete: yes
    owner: no
    group: no
  delegate_to: "{{ inventory_hostname }}"

- name: Fix ownership on web root
  ansible.builtin.file:
    path: "{{ web_root }}"
    owner: www-data
    group: www-data
    recurse: yes
  become: yes

# ─── nginx ────────────────────────────────────────────────────────────────────
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
  become: yes

- name: Ensure SSL cert directory exists (Cloudflare Origin certs live here)
  ansible.builtin.file:
    path: /etc/ssl/autoandbid
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: yes

- name: Deploy site config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../nginx/autoandbid.conf"
    dest: /etc/nginx/sites-available/autoandbid
    owner: root
    group: root
    mode: "0644"
    # Always run handlers AND force-write — `force: yes` is default but
    # makes the intent explicit. Without it Ansible compares hashes and
    # silently skips when content matches; we want the touch even on
    # "no-op" runs so timestamp updates and operators can `stat` it.
    force: yes
  become: yes
  notify: reload nginx
  register: nginx_copy

- name: Audit deployed config has img.autoandbid.bg dedicated vhost
  # Fail the deploy IMMEDIATELY if the just-copied file is missing
  # the dedicated CDN vhost. Catches the case where someone reverted
  # the repo file by accident, or the playbook is run with --check
  # against an older branch. Greps the file we literally just wrote
  # so we know we're checking the real deployed content.
  ansible.builtin.shell: |
    set -eo pipefail
    if ! grep -qE '^[[:space:]]*server_name[[:space:]]+img\.autoandbid\.bg[[:space:]]*;' /etc/nginx/sites-available/autoandbid; then
      echo "FATAL: deployed config has no 'server_name img.autoandbid.bg;' line"
      echo "------- last 50 lines of deployed file -------"
      tail -n 50 /etc/nginx/sites-available/autoandbid
      exit 1
    fi
    if ! grep -qE 'proxy_pass[[:space:]]+http://ab-back1:8001/uploads/' /etc/nginx/sites-available/autoandbid; then
      echo "FATAL: deployed config has no '/uploads/' proxy_pass to backend"
      exit 1
    fi
    echo "deployed config has dedicated img.autoandbid.bg vhost + uploads proxy_pass ✓"
  args:
    executable: /bin/bash
  changed_when: false
  become: yes

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/autoandbid
    dest: /etc/nginx/sites-enabled/autoandbid
    state: link
  become: yes
  notify: reload nginx

- name: Disable default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: yes
  notify: reload nginx

# Belt-and-suspenders: list every other site-config + conf.d snippet
# the operator may have hand-dropped onto the box during incident
# response and disable them. Only our managed `autoandbid` symlink
# survives. This is what prevents the "stale config keeps catching
# img.autoandbid.bg" failure mode that broke production for 2 days.
- name: Audit competing nginx site configs (sites-enabled)
  ansible.builtin.find:
    paths: /etc/nginx/sites-enabled
    file_type: any
    excludes:
      - autoandbid
  register: extra_sites
  become: yes

- name: Remove competing nginx sites
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ extra_sites.files | default([]) }}"
  when: extra_sites.files | default([]) | length > 0
  become: yes
  notify: reload nginx

- name: Audit competing nginx snippets (conf.d)
  ansible.builtin.find:
    paths: /etc/nginx/conf.d
    file_type: any
    patterns: "*.conf"
  register: confd_snippets
  become: yes

- name: List conf.d snippets (informational; not removed automatically)
  ansible.builtin.debug:
    msg: |
      Found {{ confd_snippets.files | length }} conf.d snippets:
      {% for f in confd_snippets.files %}- {{ f.path }}
      {% endfor %}
      If img.autoandbid.bg still 301s after deploy, inspect these
      manually — one of them may be catching the vhost.

- name: Validate nginx config
  # Fails the play immediately if `nginx -t` errors — cert files must be in
  # place before this task runs. See INITIAL_DEPLOY.md "TLS material" step.
  ansible.builtin.command: nginx -t
  changed_when: false
  become: yes

# Force-flush deferred handlers RIGHT NOW (don't wait for end of play). The
# default Ansible behaviour is "run handlers at the end of the role" which
# means if a later task fails, nginx never reloads even though the config
# already changed on disk. Flushing here makes the rest of the play see a
# reloaded nginx + we can sanity-check the new config below.
- name: Flush handlers (reload nginx now if changed)
  ansible.builtin.meta: flush_handlers

- name: Ensure nginx running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes
  become: yes

# ─── Post-deploy CDN smoke test ─────────────────────────────────────────────
# Three independent probes — any failure proves the deployed nginx config
# is wrong. We hit local nginx directly (bypass Cloudflare entirely) with
# the `Host: img.autoandbid.bg` header so the test reflects what the
# canonical CDN domain serves.
- name: Smoke test img.autoandbid.bg vhost (3 probes, origin-only)
  ansible.builtin.shell: |
    set -eo pipefail
    fail=0

    probe() {
      local path="$1"
      local expected="$2"   # comma-separated list of acceptable codes
      local check_ct="$3"   # "image" → must be image/*, "" → don't check
      local hdrs
      hdrs=$(curl -sk -D - -o /dev/null \
        -H 'Host: img.autoandbid.bg' \
        "https://127.0.0.1${path}")
      local code ct loc
      code=$(echo "$hdrs" | head -n1 | awk '{print $2}')
      ct=$(echo "$hdrs" | grep -i '^content-type:' | head -1 | tr -d '\r' | sed 's/^[Cc]ontent-[Tt]ype: *//')
      loc=$(echo "$hdrs" | grep -i '^location:' | head -1 | tr -d '\r' | sed 's/^[Ll]ocation: *//')
      echo "  path=$path code=$code content-type=$ct location=$loc"

      # Hard fail on cross-domain redirect — this is THE bug the play
      # exists to prevent.
      if echo "$loc" | grep -qE 'autoandbid\.(com|ro)'; then
        echo "  → FAIL: redirect to wrong domain"
        return 1
      fi
      # Verify status code is in the allowed set.
      if ! echo ",$expected," | grep -q ",$code,"; then
        echo "  → FAIL: code $code not in {$expected}"
        return 1
      fi
      # Verify content-type starts with image/* when caller asked for it.
      if [ "$check_ct" = "image" ] && ! echo "$ct" | grep -qE '^image/'; then
        echo "  → FAIL: content-type '$ct' is not image/*  (← THIS is the ORB block trigger)"
        return 1
      fi
      echo "  → ok"
    }

    echo "Probe 1: root → must NOT redirect to autoandbid.com"
    probe "/" "404,403,400" "" || fail=1

    echo "Probe 2: missing image → must 404, not 301"
    probe "/uploads/__probe_$(date +%s)__.jpg" "404" "" || fail=1

    echo "Probe 3: known-real upload → must be image/*  (uses first .jpg under {{ upload_dir }})"
    sample=$(find {{ upload_dir }} -type f -name '*.jpg' 2>/dev/null | head -1 || true)
    if [ -n "$sample" ]; then
      rel="${sample#{{ upload_dir }}}"
      probe "/uploads${rel}" "200" "image" || fail=1
    else
      echo "  (no .jpg sample on disk yet — skipping)"
    fi

    if [ "$fail" -ne 0 ]; then
      echo "============================================================"
      echo "CDN SMOKE TEST FAILED — img.autoandbid.bg vhost misconfigured"
      echo "============================================================"
      echo "Inspect:  sudo nginx -T | grep -B 2 -A 30 'img.autoandbid'"
      echo "and:      ls -la /etc/nginx/sites-enabled/ /etc/nginx/conf.d/"
      exit 1
    fi
  args:
    executable: /bin/bash
  changed_when: false
  become: yes
  register: cdn_smoke

- name: Display CDN smoke result
  ansible.builtin.debug:
    var: cdn_smoke.stdout_lines
