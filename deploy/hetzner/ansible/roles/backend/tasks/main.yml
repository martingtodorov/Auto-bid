---
# Backend role — runs on ab-back1.
# Sets up Python 3 (default system), MongoDB, PostgreSQL, code checkout,
# venv, secrets file, systemd unit, backup cron.
#
# History / notes for future deploys (all validated in production):
#   • We use the system default `python3` on Ubuntu 24.04 Noble (≥3.12).
#     The deadsnakes PPA for Python 3.11 was removed — it timed out during
#     deploy and is unnecessary for this code base.
#   • MongoDB 7.0 apt pool does not yet publish a `noble` channel; we pin
#     to `jammy` which runs fine on Noble.
#   • `POSTGRES_URL` must use the async driver prefix (`postgresql+asyncpg://…`).
#   • The uvicorn unit listens on 0.0.0.0:8001 because nginx on ab-front1
#     proxies via the private LAN (10.0.0.0/16) — see systemd unit.
#   • backend.env is provisioned with `force: no` so a running production
#     cannot be clobbered by a rerun of this role.

- name: Open backend & DB ports on the private LAN only
  community.general.ufw:
    rule: allow
    src: "{{ private_network_cidr }}"
    port: "{{ item }}"
    proto: tcp
  loop: ['8001', '27017', '5432']
  become: yes

# ─── Python (system default — 3.12 on Noble, 3.11 on Jammy) ──────────────────
- name: Install Python 3 + build deps
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-dev
      - python3-pip
      - build-essential
      - libpq-dev
      - libssl-dev
      - libffi-dev
      - libjpeg-dev
      - zlib1g-dev
    state: present
    update_cache: yes
  become: yes

# ─── MongoDB 7 ────────────────────────────────────────────────────────────────
# Note: the Mongo 7.0 repo does not publish a `noble` channel yet. We pin to
# `jammy` — it works out of the box on Ubuntu 24.04. Once Mongo publishes a
# Noble channel, switch this back to `{{ ansible_distribution_release }}`.
- name: Add MongoDB GPG key
  ansible.builtin.get_url:
    url: "https://pgp.mongodb.com/server-{{ mongo_major }}.asc"
    dest: /usr/share/keyrings/mongodb-server-{{ mongo_major }}.asc
    mode: "0644"
  become: yes

- name: Add MongoDB apt repo (pinned to jammy — see note above)
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-{{ mongo_major }}.asc] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/{{ mongo_major }} multiverse"
    state: present
    filename: "mongodb-org-{{ mongo_major }}"
  become: yes

- name: Install MongoDB
  ansible.builtin.apt:
    name: mongodb-org
    state: present
    update_cache: yes
  become: yes

- name: Enable & start MongoDB
  ansible.builtin.service:
    name: mongod
    state: started
    enabled: yes
  become: yes

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgres_major }}"
      - "postgresql-client-{{ postgres_major }}"
      - python3-psycopg2   # for the Ansible postgresql_* modules, NOT runtime
    state: present
  become: yes

- name: Ensure PostgreSQL is running
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: yes
  become: yes

# ─── App layout ───────────────────────────────────────────────────────────────
- name: Create app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: deploy
    group: deploy
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/scripts"   # rollback helper lives here — must exist first
    - "{{ log_dir }}"
    - "{{ backup_dir }}"
  become: yes

- name: Create secrets dir (root-only readable)
  ansible.builtin.file:
    path: "{{ secrets_dir }}"
    state: directory
    owner: root
    group: "{{ service_group }}"
    mode: "0750"
  become: yes

# ─── Code ─────────────────────────────────────────────────────────────────────
- name: Clone or update repo
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}/repo"
    version: "{{ repo_branch }}"
    force: yes
    update: yes
  become_user: deploy
  become: yes

- name: Sync backend/ into runtime location
  ansible.posix.synchronize:
    src: "{{ app_dir }}/repo/backend/"
    dest: "{{ backend_dir }}/"
    delete: yes
    rsync_opts: ["--exclude=__pycache__", "--exclude=*.pyc", "--exclude=.venv"]
  delegate_to: "{{ inventory_hostname }}"

- name: Create venv (system python3 — 3.12 on Noble, 3.11 on Jammy)
  ansible.builtin.command: "python3 -m venv {{ venv_dir }}"
  args:
    creates: "{{ venv_dir }}/bin/python"
  become_user: deploy
  become: yes

- name: pip install --upgrade pip
  ansible.builtin.pip:
    name: ["pip", "wheel", "setuptools"]
    state: latest
    virtualenv: "{{ venv_dir }}"
  become_user: deploy
  become: yes

- name: pip install requirements
  # requirements.txt ships with `asyncpg` already (required by the async
  # SQLAlchemy engine). `emergentintegrations` was removed — cannot install
  # outside the Emergent platform.
  ansible.builtin.pip:
    requirements: "{{ backend_dir }}/requirements.txt"
    virtualenv: "{{ venv_dir }}"
  become_user: deploy
  become: yes

# ─── Secrets ──────────────────────────────────────────────────────────────────
- name: Check whether backend.env already exists (first-run detection)
  ansible.builtin.stat:
    path: "{{ secrets_dir }}/backend.env"
  register: _backend_env_stat
  become: yes

- name: Deploy backend.env (ONLY if missing — production secrets are never clobbered)
  ansible.builtin.copy:
    src: backend.env
    dest: "{{ secrets_dir }}/backend.env"
    owner: root
    group: "{{ service_group }}"
    mode: "0640"
    force: no   # idempotent — existing file wins
  become: yes
  when: not _backend_env_stat.stat.exists
  notify: restart backend

- name: Report that backend.env is already in place (no overwrite)
  ansible.builtin.debug:
    msg: "{{ secrets_dir }}/backend.env already exists — leaving production secrets untouched."
  when: _backend_env_stat.stat.exists

# ─── systemd ──────────────────────────────────────────────────────────────────
- name: Install autobids-backend systemd unit
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../systemd/autobids-backend.service"
    dest: /etc/systemd/system/autobids-backend.service
    owner: root
    group: root
    mode: "0644"
  become: yes
  notify:
    - reload systemd
    - restart backend

- name: Make app dirs writable by service user
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0755"
    # `recurse: yes` is critical for {{ upload_dir }} — when the
    # directory pre-exists from an earlier deploy (or was created
    # manually as root), any subdirectories already inside it (e.g.
    # auctions/aa/, variants/) stay root-owned and the backend's
    # `www-data` process gets `Permission denied` when it tries to
    # write a new content-addressed sha256 file. We recurse so every
    # existing subdir + file flips to the service user too.
    recurse: yes
  loop:
    - "{{ log_dir }}"
    - "{{ backup_dir }}"
    - "/var/lib/autobids"
    - "{{ upload_dir }}"   # disk storage backend writes content-addressed images here; nginx aliases /api/uploads/ to this path. Default: /opt/autobids/uploads
  become: yes

- name: Enable & start backend
  ansible.builtin.systemd:
    name: autobids-backend
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes

# ─── Post-deploy storage write probe ─────────────────────────────────────────
# Fail the deploy loudly if `www-data` cannot write to {{ upload_dir }}.
# Previously a misconfigured chown would only surface when a seller hit
# Submit and got an opaque 500 — operators wouldn't notice until users
# complained. Probing as the service user during deploy turns it into a
# fast, obvious red Ansible failure.
- name: Write probe upload dir as service user
  ansible.builtin.command:
    cmd: "sudo -u {{ service_user }} touch {{ upload_dir }}/.ansible-write-probe"
  register: upload_probe
  changed_when: false
  failed_when: upload_probe.rc != 0
  become: yes

- name: Remove write probe marker
  ansible.builtin.file:
    path: "{{ upload_dir }}/.ansible-write-probe"
    state: absent
  become: yes
  when: upload_probe.rc == 0

# ─── Backups (daily at 03:30) ─────────────────────────────────────────────────
- name: Install nightly DB backup script
  ansible.builtin.copy:
    dest: /usr/local/bin/autobids-backup.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      DATE=$(date +%Y-%m-%d)
      BACKUP_DIR="{{ backup_dir }}"
      mkdir -p "$BACKUP_DIR"
      mongodump --quiet --gzip --archive="$BACKUP_DIR/mongo-$DATE.gz"
      sudo -u postgres pg_dumpall | gzip > "$BACKUP_DIR/postgres-$DATE.sql.gz"
      # Retention: keep last 14 days
      find "$BACKUP_DIR" -type f -mtime +14 -delete
  become: yes

- name: Add backup cron
  ansible.builtin.cron:
    name: "autobids nightly backup"
    user: root
    minute: "30"
    hour: "3"
    job: "/usr/local/bin/autobids-backup.sh >> {{ log_dir }}/backup.log 2>&1"
  become: yes

# ─── Rollback helper ──────────────────────────────────────────────────────────
- name: Drop rollback helper
  ansible.builtin.copy:
    dest: "{{ app_dir }}/scripts/rollback.sh"
    mode: "0755"
    content: |
      #!/bin/bash
      # Quick rollback — swap live ↔ previous and restart.
      set -euo pipefail
      cd {{ app_dir }}
      [ -d backend.previous ] || { echo "no previous release"; exit 1; }
      mv backend backend.tmp
      mv backend.previous backend
      mv backend.tmp backend.previous
      sudo systemctl restart autobids-backend
      echo "Rolled back. Service restarted."
  become: yes
