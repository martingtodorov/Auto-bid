# Hetzner inventory.
#
# `ansible_host` deliberately uses PUBLIC IP for ab-front1 and the JUMP-via
# ab-front1 trick for ab-back1 — see ssh.cfg / README for details. The
# `private_ip` var is what ends up in /etc/hosts on both machines so the
# code can reach services by name (ab-back1, ab-db1) over the internal LAN.

[frontend]
ab-front1  ansible_host=178.105.37.1  private_ip=10.0.0.2

[backend]
ab-back1   ansible_host=10.0.0.3      private_ip=10.0.0.3  ansible_ssh_common_args='-o ProxyJump=deploy@178.105.37.1'

[all:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3
