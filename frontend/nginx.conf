# nginx config for the static React build.
#
# Two things to configure at runtime via envsubst or a platform template:
#   BACKEND_HOST  (e.g. `backend:8001` for docker-compose; `api.example.com`
#                 when running on a PaaS with separate services).
#
# On platforms where frontend and backend share the same external host
# (e.g. App Platform/Kubernetes ingress with path routing), point
# BACKEND_HOST at the internal service hostname + port.
upstream backend_upstream {
    # Defaults to docker-compose service name. Override via `BACKEND_HOST`
    # env at container start (entrypoint runs envsubst on this file).
    server ${BACKEND_HOST};
}

server {
    listen 80 default_server;
    server_name _;

    # Security headers (defence in depth; CDN/Cloudflare can reinforce).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Large auction uploads (base64 images in inline mode can push 60+ MB).
    client_max_body_size 80m;
    client_body_buffer_size 16m;
    client_body_timeout 120s;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    # Health endpoint for platform probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API + WebSocket pass-through.
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static asset cache: hashed filenames are safe to cache aggressively.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any path delegates to index.html so React Router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
