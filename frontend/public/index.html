<!doctype html>
<html lang="bg">
    <head>
        <meta charset="utf-8" />
        <!-- Viewport: zoom is intentionally NOT blocked — pinch-zoom on
             touch devices and Ctrl+scroll on desktop are baseline
             accessibility affordances. Components that need to opt out
             for specific gestures do so locally. -->
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#0f4f3a" />
        <title>Auto&Bid — Онлайн търгове за автомобили</title>
        <meta name="description" content="Auto&Bid — най-добрите автомобили на търг. Прозрачно наддаване, редакционен преглед, 60+ снимки и защита на купувача. Регистрирайте се и наддавайте безплатно." />
        <meta name="keywords" content="автомобилни търгове, онлайн търг, коли на търг, продавам кола, купувам кола, BMW, Mercedes, Audi, Porsche, търг България, auto aukzion, autoandbid" />
        <meta name="author" content="autoandbid.com" />
        <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
        <meta name="googlebot" content="index, follow" />
        <!-- canonical / og:url / og:locale are intentionally OMITTED from
             this static SPA HTML. Every non-trivial crawler (Facebook,
             Twitter, LinkedIn, Bing, Slack, Discord, Apple News, etc.)
             is routed by nginx through `/api/share/...` SSR endpoints
             which emit per-host canonical + per-language `og:locale` +
             absolute `og:image` URLs + `<link rel="alternate" hreflang>`
             pointers to the same listing on the sibling TLDs.

             We do NOT rely on client-side JS to patch these tags at
             runtime. Social-bot scrapers don't execute JavaScript. -->
        <link rel="alternate" hreflang="bg" href="https://autoandbid.bg/" />
        <link rel="alternate" hreflang="ro" href="https://autoandbid.ro/" />
        <link rel="alternate" hreflang="en" href="https://autoandbid.com/" />
        <link rel="alternate" hreflang="x-default" href="https://autoandbid.com/" />

        <!-- Favicon — multi-size -->
        <link rel="icon" href="/favicon.ico" sizes="any" />
        <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
        <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon-48.png" />

        <!-- PWA: required for iOS push notifications (Add to Home Screen) -->
        <link rel="manifest" href="/manifest.webmanifest" />
        <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="Auto&Bid" />

        <!-- ──────────────────────────────────────────────────────────────────
             Open Graph fallback (absolute URLs, BG canonical domain).

             These tags are ONLY seen by:
               • iOS share-sheet preview generator (which fetches the SPA
                 HTML before any UA-gated nginx routing kicks in).
               • Email link unfurlers that do not match nginx's
                 `$is_social_bot` regex.
               • Raw curl / debug tools hitting the SPA directly.

             Every real social-bot UA (FacebookExternalHit, Twitterbot,
             LinkedInBot, Slackbot, etc.) is rewritten by nginx to the
             per-route `/api/share/...` SSR endpoint which emits richer,
             locale-aware meta (see `backend/routers/seo.py`).

             Absolute URLs are mandatory here: Facebook explicitly
             rejects relative paths like `/api/og/home.jpg` with the
             "not a valid URL" error.
             ───────────────────────────────────────────────────────── -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Auto&Bid" />
        <meta property="og:title" content="Auto&Bid — Подбрани автомобили. Прозрачно наддаване." />
        <meta property="og:description" content="Подбрани автомобили. Прозрачно наддаване. Открийте подбрани автомобили с подробна документация, качествени снимки и ясни условия за участие в търга." />
        <meta property="og:image" content="https://autoandbid.bg/api/og/home.jpg" />
        <meta property="og:image:secure_url" content="https://autoandbid.bg/api/og/home.jpg" />
        <meta property="og:image:type" content="image/jpeg" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt" content="Auto&Bid — Подбрани автомобили. Прозрачно наддаване." />
        <!-- og:url intentionally OMITTED. With it hard-coded to the
             homepage, every per-auction share that hits the static SPA
             (when nginx UA-gate isn't routing the bot to /api/share)
             gets canonical-overridden to the homepage. Without og:url,
             Facebook + Twitter use the FETCHED URL as canonical, which
             is the correct per-route behaviour for an SPA served from
             one index.html across every path. -->
        <meta property="og:locale" content="bg_BG" />
        <meta property="og:locale:alternate" content="en_US" />
        <meta property="og:locale:alternate" content="ro_RO" />
        <!-- fb:app_id intentionally NOT emitted in this static fallback.
             Every real social-bot UA (FacebookExternalHit, Twitterbot,
             LinkedInBot) is rewritten by nginx to /api/share/... which
             injects fb:app_id from the backend's FB_APP_ID env var.
             Hard-coding a CRA placeholder here would leak
             `%REACT_APP_FB_APP_ID%` literal when the var is unset. -->

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Auto&Bid — Подбрани автомобили. Прозрачно наддаване." />
        <meta name="twitter:description" content="Подбрани автомобили. Прозрачно наддаване. Открийте подбрани автомобили с подробна документация, качествени снимки и ясни условия за участие в търга." />
        <meta name="twitter:image" content="https://autoandbid.bg/api/og/home.jpg" />

        <!-- Structured Data: Organization + WebSite with SearchAction -->
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@graph": [
            {
              "@type": "Organization",
              "@id": "https://autoandbid.com/#org",
              "name": "Auto&Bid",
              "url": "https://autoandbid.com/",
              "logo": "https://autoandbid.com/og-default.jpg",
              "sameAs": [],
              "contactPoint": [{
                "@type": "ContactPoint",
                "contactType": "customer support",
                "email": "contact@autoandbid.com",
                "availableLanguage": ["bg", "ro", "en"]
              }]
            },
            {
              "@type": "WebSite",
              "@id": "https://autoandbid.com/#website",
              "url": "https://autoandbid.com/",
              "name": "Auto&Bid",
              "publisher": { "@id": "https://autoandbid.com/#org" },
              "inLanguage": "bg-BG",
              "potentialAction": {
                "@type": "SearchAction",
                "target": "https://autoandbid.com/auctions?q={search_term_string}",
                "query-input": "required name=search_term_string"
              }
            }
          ]
        }
        </script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <!-- IBM Plex Mono for tabular numerics (`.font-mono`) and Manrope
             Bold for the Auto&Bid wordmark (`.font-logo`). Everything else
             uses the OS's `system-ui` stack, no network roundtrip required. -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@700;800&display=swap" />
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
