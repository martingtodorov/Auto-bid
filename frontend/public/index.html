<!doctype html>
<html lang="bg">
    <head>
        <meta charset="utf-8" />
        <!-- Viewport: locked on touch devices (prevents accidental double-tap
             zoom and auto-zoom on input focus), but kept zoomable on desktop
             where pinch/Ctrl+scroll is a standard accessibility affordance.
             The inline script below swaps the attribute before React mounts
             so there's no flash of the wrong scale. The `Lightbox` component
             re-enables pinch zoom globally while it's open on mobile. -->
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <script>
          (function () {
            try {
              var isDesktop = window.matchMedia && window.matchMedia("(hover: hover) and (pointer: fine)").matches;
              if (isDesktop) {
                var m = document.querySelector('meta[name="viewport"]');
                if (m) m.setAttribute("content", "width=device-width, initial-scale=1, viewport-fit=cover");
              }
            } catch (e) { /* no-op — touch fallback is fine */ }
          })();
        </script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <!-- Preload the two critical font weights used above the fold
             (Manrope 400 body + 700 display). Lighthouse was flagging
             "Avoid chaining critical requests" and "font swap shift" —
             preloading shortcuts the CSS→font dependency chain and
             halves the visible swap window. Font file URLs are pinned
             by Google Fonts' revisioned filenames; update them if we
             ever change the `family` query. -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" />
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
